<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C67E"/>
      <stop offset="100%" stop-color="#E8932B"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Cat ears -->
  <path d="M140 180 L170 90 L220 160 Z" fill="#E8C872"/>
  <path d="M292 160 L342 90 L372 180 Z" fill="#E8C872"/>
  <path d="M155 170 L175 105 L210 158 Z" fill="#F5A0B0"/>
  <path d="M302 158 L337 105 L357 170 Z" fill="#F5A0B0"/>
  <!-- Blob body -->
  <ellipse cx="256" cy="300" rx="140" ry="150" fill="#E8C872"/>
  <!-- Face area -->
  <ellipse cx="256" cy="260" rx="120" ry="100" fill="#F0D48A"/>
  <!-- Eyes - big round dark -->
  <circle cx="215" cy="245" r="22" fill="#1A1008"/>
  <circle cx="297" cy="245" r="22" fill="#1A1008"/>
  <!-- Eye sparkles -->
  <circle cx="207" cy="237" r="8" fill="white"/>
  <circle cx="212" cy="248" r="4" fill="white"/>
  <circle cx="289" cy="237" r="8" fill="white"/>
  <circle cx="294" cy="248" r="4" fill="white"/>
  <!-- Tiny triangle nose -->
  <path d="M250 272 L256 264 L262 272 Z" fill="#F5A0B0"/>
  <!-- Mouth -->
  <path d="M240 278 Q248 286 256 278 Q264 286 272 278" fill="none" stroke="#1A1008" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rosy blush cheeks -->
  <ellipse cx="185" cy="272" rx="18" ry="12" fill="#F5C4C4" opacity="0.4"/>
  <ellipse cx="327" cy="272" rx="18" ry="12" fill="#F5C4C4" opacity="0.4"/>
  <!-- Stubby paws -->
  <ellipse cx="195" cy="410" rx="30" ry="20" fill="#E8C872"/>
  <ellipse cx="317" cy="410" rx="30" ry="20" fill="#E8C872"/>
  <!-- Paw beans -->
  <circle cx="187" cy="415" r="5" fill="#F5A0B0"/>
  <circle cx="200" cy="415" r="5" fill="#F5A0B0"/>
  <circle cx="193" cy="406" r="5" fill="#F5A0B0"/>
  <circle cx="309" cy="415" r="5" fill="#F5A0B0"/>
  <circle cx="322" cy="415" r="5" fill="#F5A0B0"/>
  <circle cx="315" cy="406" r="5" fill="#F5A0B0"/>
  <!-- Small heart -->
  <g transform="translate(340, 170) scale(0.6)">
    <path d="M0-30 C-15-50-40-30-40-10 C-40 15 0 40 0 40 C0 40 40 15 40-10 C40-30 15-50 0-30Z" fill="#F5A0B0" opacity="0.7"/>
  </g>
</svg>
